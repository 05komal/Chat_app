<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Modern Chat App - Real-time Messaging Application" />
  <title>Chat App - Real-time Messaging</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles/global.css" />
  <link rel="stylesheet" href="styles/auth.css" />
  <link rel="stylesheet" href="styles/chat.css" />
  <link rel="stylesheet" href="styles/components.css" />
  
  <!-- Icons (Font Awesome via CDN) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
</head>
<body>
  <div id="root"></div>

  <!-- Page Templates -->
  <template id="login-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <h1>💬 ChatApp</h1>
          <p>Connect with anyone, anywhere</p>
        </div>

        <div id="error-message" class="auth-error"></div>

        <form class="auth-form" id="login-form">
          <div class="form-group">
            <label>Phone Number</label>
            <div class="auth-input-group">
              <i class="fas fa-phone auth-input-icon"></i>
              <input
                type="text"
                id="login-phone"
                placeholder="Enter your phone number"
                required
                autocomplete="tel"
              />
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="auth-input-group">
              <i class="fas fa-lock auth-input-icon"></i>
              <input
                type="password"
                id="login-password"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
              />
            </div>
          </div>

          <button type="submit" class="auth-button" id="login-btn">
            <i class="fas fa-sign-in-alt"></i> Login
          </button>
        </form>

        <div class="auth-footer">
          Don't have an account?
          <a href="#" onclick="app.goToRegister()">Sign up here</a>
        </div>
      </div>
    </div>
  </template>

  <template id="register-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <h1>💬 ChatApp</h1>
          <p>Create your account</p>
        </div>

        <div id="register-error" class="auth-error"></div>

        <form class="auth-form" id="register-form">
          <div class="form-group">
            <label>Phone Number</label>
            <div class="auth-input-group">
              <i class="fas fa-phone auth-input-icon"></i>
              <input
                type="text"
                id="register-phone"
                placeholder="+1 (555) 123-4567"
                required
                autocomplete="tel"
              />
            </div>
          </div>

          <div class="form-group">
            <label>First Name</label>
            <div class="auth-input-group">
              <i class="fas fa-user auth-input-icon"></i>
              <input
                type="text"
                id="register-firstName"
                placeholder="First name"
                autocomplete="given-name"
              />
            </div>
          </div>

          <div class="form-group">
            <label>Last Name</label>
            <div class="auth-input-group">
              <i class="fas fa-user auth-input-icon"></i>
              <input
                type="text"
                id="register-lastName"
                placeholder="Last name"
                autocomplete="family-name"
              />
            </div>
          </div>

          <button type="submit" class="auth-button" id="register-btn">
            <i class="fas fa-user-plus"></i> Get OTP
          </button>
        </form>

        <div class="auth-footer">
          Already have an account?
          <a href="#" onclick="app.goToLogin()">Login here</a>
        </div>
      </div>
    </div>
  </template>

  <template id="otp-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <h1>💬 ChatApp</h1>
          <p>Verify your phone number</p>
        </div>

        <div id="otp-error" class="auth-error"></div>

        <form class="auth-form" id="otp-form">
          <p style="text-align: center; color: var(--text-light);">
            We've sent a verification code to <strong id="otp-phone"></strong>
          </p>

          <div class="form-group">
            <label>Verification Code</label>
            <div class="otp-input-group" id="otp-inputs"></div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="auth-input-group">
              <i class="fas fa-lock auth-input-icon"></i>
              <input
                type="password"
                id="otp-password"
                placeholder="Create a password"
                required
              />
            </div>
            <small id="password-strength" style="color: var(--text-light);"></small>
          </div>

          <button type="submit" class="auth-button" id="otp-btn">
            <i class="fas fa-check"></i> Verify
          </button>
        </form>

        <div class="timer" id="otp-timer">
          Code expires in: <span class="time" id="timer-count">10:00</span>
        </div>

        <div class="auth-footer">
          Didn't receive the code?
          <button
            type="button"
            class="resend-otp-btn"
            id="resend-btn"
            onclick="app.resendOTP()"
          >
            Resend OTP
          </button>
        </div>
      </div>
    </div>
  </template>

  <template id="chat-page">
    <div class="chat-layout">
      <!-- Sidebar -->
      <div class="chat-sidebar" id="chat-sidebar">
        <div class="sidebar-header">
          <h2 class="sidebar-title">Chats</h2>
          <div class="sidebar-actions">
            <button class="sidebar-btn" title="New chat">
              <i class="fas fa-pen"></i>
            </button>
            <button class="sidebar-btn" title="Menu" onclick="app.showMenu()">
              <i class="fas fa-ellipsis-v"></i>
            </button>
          </div>
        </div>

        <div class="sidebar-search">
          <input
            type="text"
            class="search-input"
            id="search-input"
            placeholder="Search conversations..."
          />
        </div>

        <ul class="conversations-list" id="conversations-list"></ul>
      </div>

      <!-- Main Chat Area -->
      <div class="chat-main">
        <div id="empty-chat" class="empty-state">
          <div class="empty-state-icon">👋</div>
          <h3>Welcome to ChatApp</h3>
          <p>Select a conversation to start chatting</p>
        </div>

        <div id="chat-container" class="hidden" style="display: none; flex: 1; flex-direction: column;">
          <!-- Chat Header -->
          <div class="chat-header">
            <div class="chat-header-info">
              <div class="chat-header-avatar" id="chat-avatar">A</div>
              <div>
                <h3 id="chat-name">Contact Name</h3>
                <div class="chat-header-status">
                  <span class="status-indicator" id="contact-status"></span>
                  <span id="contact-status-text">offline</span>
                </div>
              </div>
            </div>
            <div class="chat-header-actions">
              <button class="chat-header-btn" title="Call">
                <i class="fas fa-phone"></i>
              </button>
              <button class="chat-header-btn" title="Video call">
                <i class="fas fa-video"></i>
              </button>
              <button class="chat-header-btn" title="Contact info" onclick="app.showContactInfo()">
                <i class="fas fa-info-circle"></i>
              </button>
            </div>
          </div>

          <!-- Messages Area -->
          <div class="messages-container" id="messages-container"></div>

          <!-- Input Area -->
          <div class="chat-input-area">
            <textarea
              id="message-input"
              class="message-input"
              placeholder="Type a message..."
              rows="1"
            ></textarea>
            <button class="send-btn" id="send-btn" title="Send message">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- Scripts -->
  <script type="module" src="../src/js/app.js"></script>
</body>
</html>
