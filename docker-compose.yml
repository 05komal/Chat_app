version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: chat-app-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: chat-app
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - chat-app-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/chat-app --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chat-app-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/chat-app
      PORT: 5000
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      JWT_EXPIRE: 7d
      OTP_EXPIRE: 10
      CLIENT_URL: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - chat-app-network
    command: npm run dev

  # Frontend Development Server (optional)
  frontend:
    image: node:18-alpine
    container_name: chat-app-frontend
    restart: always
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ./client:/app
    networks:
      - chat-app-network
    command: python -m http.server 3000 --directory public

volumes:
  mongodb_data:
  mongodb_config:

networks:
  chat-app-network:
    driver: bridge
